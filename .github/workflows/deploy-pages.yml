# Deploy static Godot web build to GitHub Pages.
#
# Setup (once):
#   1. Repo → Settings → Pages → Source: GitHub Actions
#   2. Repo → Settings → Secrets and variables → Actions → Variables:
#        API_BASE_URL = https://api.yoursite.com   (your production backend, HTTPS)
#
# Backend CORS_ORIGIN must match this site origin (no path), e.g.:
#   https://moraspirit.github.io

name: Deploy GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      GODOT_VERSION: 4.6.0
      EXPORT_PRESET: Web
      API_BASE_URL: ${{ vars.API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Verify Godot
        run: godot --version

      - name: Configure API URL for production
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "::error::Set repository variable API_BASE_URL (e.g. https://api.yoursite.com)"
            exit 1
          fi
          case "$API_BASE_URL" in
            https://*) ;;
            *)
              echo "::error::API_BASE_URL must use HTTPS in production (got: $API_BASE_URL)"
              exit 1
              ;;
          esac
          python3 <<'PY'
          import re
          from pathlib import Path
          path = Path("scripts/secure/sim_constants.gd")
          text = path.read_text()
          api = __import__("os").environ["API_BASE_URL"].rstrip("/")
          text = re.sub(
              r'const API_BASE: String = "[^"]*"',
              f'const API_BASE: String = "{api}"',
              text,
          )
          text = re.sub(
              r"const DEBUG_API: bool = \w+",
              "const DEBUG_API: bool = false",
              text,
          )
          text = re.sub(
              r"const OFFLINE_FALLBACK: bool = \w+",
              "const OFFLINE_FALLBACK: bool = false",
              text,
          )
          build = __import__("os").environ.get("GITHUB_SHA", "dev")[:12]
          text = re.sub(
              r'const CLIENT_BUILD: String = "[^"]*"',
              f'const CLIENT_BUILD: String = "{build}"',
              text,
          )
          path.write_text(text)
          PY

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release "${EXPORT_PRESET}" build/web/index.html
          BUILD_ID="${GITHUB_SHA:0:12}" SIM_VERSION=6 python3 scripts/post_export_web.py
          echo "Build sizes:"
          ls -lh build/web/index.*.pck build/web/index.*.wasm build/web/index.*.js build/web/version.json 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
