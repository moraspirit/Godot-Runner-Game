# Deploy static Godot web build to GitHub Pages.
#
# Setup (once) — pick ONE source (if you see README instead of the game, Pages is
# still pointed at the master branch; change it using either option below):
#
#   Option A (recommended): Settings → Pages → Build and deployment → Source: GitHub Actions
#
#   Option B: Settings → Pages → Deploy from branch → branch: gh-pages → folder: / (root)
#             (this workflow pushes build/web to the gh-pages branch on every run)
#
#   Also set: Settings → Secrets and variables → Actions → Variables:
#        API_BASE_URL = https://api.yoursite.com   (HTTPS, no trailing slash)
#
# Backend CORS_ORIGIN must match the site origin (no path), e.g.:
#   https://run.moraspirit.com

name: Deploy GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Official GitHub Pages pattern: queue deployments; do NOT cancel in-progress.
# cancel-in-progress: true leaves a Pages deployment stuck and the next deploy gets HTTP 400.
# See: https://github.com/actions/starter-workflows/blob/main/pages/static.yml
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.0
      EXPORT_PRESET: Web
      API_BASE_URL: ${{ vars.API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Verify Godot
        run: godot --version

      - name: Configure API URL for production
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "::error::Set repository variable API_BASE_URL (e.g. https://api.yoursite.com)"
            exit 1
          fi
          case "$API_BASE_URL" in
            https://*) ;;
            *)
              echo "::error::API_BASE_URL must use HTTPS in production (got: $API_BASE_URL)"
              exit 1
              ;;
          esac
          python3 <<'PY'
          import re
          from pathlib import Path
          path = Path("scripts/secure/sim_constants.gd")
          text = path.read_text()
          api = __import__("os").environ["API_BASE_URL"].rstrip("/")
          text = re.sub(
              r'const API_BASE: String = "[^"]*"',
              f'const API_BASE: String = "{api}"',
              text,
          )
          text = re.sub(
              r"const DEBUG_API: bool = \w+",
              "const DEBUG_API: bool = false",
              text,
          )
          text = re.sub(
              r"const OFFLINE_FALLBACK: bool = \w+",
              "const OFFLINE_FALLBACK: bool = false",
              text,
          )
          build = __import__("os").environ.get("GITHUB_SHA", "dev")[:12]
          text = re.sub(
              r'const CLIENT_BUILD: String = "[^"]*"',
              f'const CLIENT_BUILD: String = "{build}"',
              text,
          )
          path.write_text(text)
          PY

      - name: Export Web
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release "${EXPORT_PRESET}" build/web/index.html
          BUILD_ID="${GITHUB_SHA:0:12}" SIM_VERSION=6 python3 scripts/post_export_web.py
          echo "Build sizes:"
          ls -lh build/web/index.*.pck build/web/index.*.wasm build/web/index.*.js build/web/version.json 2>/dev/null || true

      - name: Verify web export
        run: |
          test -f build/web/index.html
          test -f build/web/.nojekyll
          grep -q '<title>Runner</title>' build/web/index.html
          ls -la build/web/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

      # Fallback for repos still using "Deploy from branch" (README shows when branch=master).
      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true
          commit_message: "Deploy Godot web build ${{ github.sha }}"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
